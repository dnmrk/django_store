name: CI and Deploy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks, migrations, and tests
        env:
          SECRET_KEY: ci-secret-key-only-for-github-actions
          DEBUG: 'True'
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
        run: |
          python manage.py check
          python manage.py migrate --noinput
          python manage.py test --parallel

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy to django.henshuuz.dev
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build release frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create release archive
        run: |
          mkdir -p release
          tar \
            --exclude='.git' \
            --exclude='venv' \
            --exclude='frontend/node_modules' \
            --exclude='django_store_db' \
            --exclude='release' \
            -czf release/django-store-release.tgz .

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: release/django-store-release.tgz
          target: /tmp
          strip_components: 1

      - name: Run server deploy helper
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            sudo /usr/local/bin/deploy-django-store /tmp/django-store-release.tgz
